# Google Cloud Build Configuration
# This configuration builds the Docker image and deploys to Cloud Run

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    id: 'deploy-cloudrun'
    args:
      - 'deploy'
      - 'teams4uwebsitedemo'
      - '--image'
      - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo:$SHORT_SHA'
      - '--platform'
      - 'managed'
      - '--region'
      - 'asia-southeast1'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '100'
      - '--set-env-vars'
      - 'NODE_ENV=production'

# Images to push to registry
images:
  - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo:latest'
  - 'gcr.io/$PROJECT_ID/teams4uwebsitedemo:$SHORT_SHA'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Build timeout
timeout: '1800s'
